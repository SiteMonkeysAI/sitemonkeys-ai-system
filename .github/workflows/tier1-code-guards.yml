name: Tier 1 Code Guards

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  code-guards:
    name: Tier 1 Code Guards
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Tier 1 Code Guards
        run: node --test tests/tier1/code-guards.test.js

      - name: Display test results
        if: always()
        run: |
          echo "Tier 1 Code Guards completed"
          echo "See test output above for details"
