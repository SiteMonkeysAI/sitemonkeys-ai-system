name: Invoke Embedding Index Endpoint

on:
  workflow_dispatch:
    inputs:
      admin_key:
        description: "Admin key (x-admin-key header value)"
        required: true
      target_url:
        description: "Base URL of the deployment to target"
        required: true
        default: "https://sitemonkeys-ai-system-production.up.railway.app"
      timeout_seconds:
        description: "curl timeout in seconds (index creation can take minutes on large tables)"
        required: false
        default: "300"

permissions:
  contents: write

jobs:
  call-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: POST /api/admin/add-embedding-index
        id: call
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ github.event.inputs.target_url }}/api/admin/add-embedding-index" \
            -H "x-admin-key: ${{ github.event.inputs.admin_key }}" \
            -H "Content-Type: application/json" \
            --max-time "${{ github.event.inputs.timeout_seconds }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          JSON_BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body:"
          echo "$JSON_BODY" | python3 -m json.tool 2>/dev/null || echo "$JSON_BODY"
          echo "json_response<<EOF" >> "$GITHUB_OUTPUT"
          echo "$JSON_BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          echo "$JSON_BODY" > EMBEDDING_INDEX_RESPONSE.json

      - name: Report result
        run: |
          echo "=== Full JSON Response ==="
          cat EMBEDDING_INDEX_RESPONSE.json | python3 -m json.tool 2>/dev/null || cat EMBEDDING_INDEX_RESPONSE.json
          echo "HTTP Status Code: ${{ steps.call.outputs.http_code }}"

      - name: Commit response file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add EMBEDDING_INDEX_RESPONSE.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: capture embedding-index endpoint response"
            git push
          fi
